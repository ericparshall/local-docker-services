# Native signal-cli HTTP daemon (JSON-RPC + SSE) for Hermes Agent
# Upstream: https://github.com/AsamK/signal-cli
# Package image: https://packaging.gitlab.io/signal-cli/installation/docker/
# Host port: 18701 (see ../../PORTS.md)
#
# Hermes requires the *native* signal-cli HTTP API:
#   GET  /api/v1/check
#   GET  /api/v1/events?account=...
#   POST /api/v1/rpc
# The old bbernhard/signal-cli-rest-api wrapper (/v1/*) is NOT compatible.
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#   docker compose logs -f
#   # first time: link a device (see README.md)
#   docker compose down

services:
  signal-cli:
    image: registry.gitlab.com/packaging/signal-cli/signal-cli-${SIGNAL_VARIANT:-jre}:${SIGNAL_IMAGE_TAG:-latest}
    container_name: signal-cli
    # always: come back after Docker/daemon/machine restart
    restart: always
    # Multi-account HTTP JSON-RPC + SSE (Hermes adapter protocol)
    # Bind 0.0.0.0 inside the container; host binding is localhost-ish via published port.
    command:
      - daemon
      - --http
      - 0.0.0.0:8080
      - --no-receive-stdout
    ports:
      # Static host port (not 8080) — see ../../PORTS.md
      - "${SIGNAL_HOST_PORT:-18701}:8080"
    volumes:
      # Account keys & config — keep private and backed up
      # Packaging image uses /var/lib/signal-cli (HOME for user signal-cli)
      - ./data:/var/lib/signal-cli
    tmpfs:
      # Required by packaging image docs (native/JRE needs exec tmp)
      - /tmp:exec
    # Image has no curl/wget; port-open check is enough for restart policy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
